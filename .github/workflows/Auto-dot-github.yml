###
###   Copy above (including 'on') and uncomment to reuse this action in other repo
###


permissions:
  pull-requests: write
  contents: write
  issues: write

env:
  GH_TOKEN: ${{ github.token }}  # For gh command
  # Sync .github
  WORKDIR: dot-github-sync
  TARGET_DIR: .github
  CENTRAL_REPO: ${{ github.repository_owner }}/.github
  # PR labeler
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
  REPO: ${{ github.repository }}
  # Auto changelog
  CHANGELOG_FILE: CHANGELOG.md


jobs:

  sync-dot-github:
    name: 'Sync `.github` Folder Up to Date'
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && !inputs.auto-bump-version

    runs-on: ubuntu-slim
    steps:

      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ env.TARGET_DIR }}
          sparse-checkout-cone-mode: true

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.CENTRAL_REPO }}
          path: ${{ env.WORKDIR }}
          sparse-checkout: |
            ${{ env.TARGET_DIR }}
          sparse-checkout-cone-mode: true

      - name: Main
        run: |
          set -euo pipefail

          echo "===================================="
          echo "📝 Preparing Repository"
          echo "===================================="

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/dot-github-${{ github.job }}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          echo "===================================="
          echo "✏️ Update Files"
          echo "===================================="

          # Sync all files (additive)
          mkdir -p "$TARGET_DIR"
          rsync -av "$WORKDIR/$TARGET_DIR/" "$TARGET_DIR/"

          # There is no way to update workflows with 'permissions' in yaml
          rm -rf "$TARGET_DIR"/workflows/*.yml

          echo "===================================="
          echo "🚀 Creating Pull Request"
          echo "===================================="

          TS=$(date -u +"%Y%m%d-%H%M%S")

          # Force push even if not allowed in .gitignore
          git add -f --ignore-removal "$TARGET_DIR"
          if ! git commit -m "[bot] Sync \`${TARGET_DIR}\` ($TS)"; then
            echo "::warning title=No changes::Sync skipped"
            exit 0
          fi
          git push -u origin "$BRANCH"

          # Create PR only if one doesn't already exist
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --fill \
            || echo "::warning title=PR already exists::Sync skipped"

  pr-labeler:
    name: 'Label for GH Release Notes'
    if: |
      github.event_name == 'pull_request'

    runs-on: ubuntu-slim
    steps:

      - name: Main
        run: |
          set -euo pipefail

          ## Check both PR title and merge commit title

          matches_pattern() {
            local pattern="$1"

            # Case-insensitive
            echo "$COMMIT_TITLE" | grep -qiE "$pattern" \
              || echo "$PR_TITLE" | grep -qiE "$pattern"
          }

          ## Get a merge commit title

          if [ -n "$MERGE_COMMIT_SHA" ]; then
            COMMIT_TITLE=$(gh api \
              repos/$REPO/commits/$MERGE_COMMIT_SHA \
              --jq '.commit.message | split("\n")[0]')
          else
            COMMIT_TITLE=""
          fi

          {
            echo "📦 PR title: $PR_TITLE"
            echo "🔀 Merge commit title: $COMMIT_TITLE"
          } >> $GITHUB_STEP_SUMMARY

          ## Labels chosen for GH Release Notes Generation

          labels=()

          if matches_pattern '^fix[:(]'; then
            labels+=("bug")
          fi

          if matches_pattern '^feat[:(]'; then
            labels+=("enhancement")
          fi

          if matches_pattern '^docs[:(]'; then
            labels+=("documentation")
          fi

          if matches_pattern '^[a-z]+(\(.+\))?!:'; then
            labels+=("breaking-change")
          fi

          ## Add detected labels or log warning

          if [ ${#labels[@]} -eq 0 ]; then
            echo "::warning title=No release-note label detected::PR title='$PR_TITLE' commit title='$COMMIT_TITLE'"
          fi

          echo "🏷️ Detected Labels" >> $GITHUB_STEP_SUMMARY

          for label in "${labels[@]}"; do
            echo "- $label" >> $GITHUB_STEP_SUMMARY

            gh issue edit "$PR_NUMBER" \
              --repo "$REPO" \
              --add-label "$label"
          done

  auto-changelog:
    name: 'Auto Update CHANGELOG.md'
    if: |
      (
        (github.event_name == 'release' && github.event.action == 'published')
        || github.event_name == 'workflow_dispatch'
      )
      && !inputs.auto-bump-version

    runs-on: ubuntu-slim
    steps:

      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ env.CHANGELOG_FILE }}
          sparse-checkout-cone-mode: true

      - name: Main
        run: |
          set -euo pipefail

          echo "===================================="
          echo "📦 Fetch latest release"
          echo "===================================="

          RELEASE_JSON="$(gh api repos/:owner/:repo/releases?per_page=3 \
            --jq 'map(select(.draft == false)
                  | {tagName: .tag_name, body: .body, url: .html_url})
                  | .[0]' )"

          RELEASE_TAG="$(jq -r '.tagName' <<< "$RELEASE_JSON" | sed 's/^v//')"
          RELEASE_BODY="$(jq -r '.body' <<< "$RELEASE_JSON")"
          RELEASE_URL="$(jq -r '.url' <<< "$RELEASE_JSON")"

          echo "👉 Tag:  $RELEASE_TAG"
          echo "👉 URL:  $RELEASE_URL"
          echo "👉 Body (first 10 lines):"
          echo "$RELEASE_BODY" | head -n 10

          echo "===================================="
          echo "📝 Preparing Repository"
          echo "===================================="

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/dot-github-${{ github.job }}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          echo "===================================="
          echo "✏️ Update Files"
          echo "===================================="

          touch "$CHANGELOG_FILE"

          if grep -Fq "## [${RELEASE_TAG}](https://github.com/" "$CHANGELOG_FILE"; then
            echo "::warning title=Already exists::Skipping CHANGELOG update: ${RELEASE_TAG}"
            exit 0
          fi

          # Remove '## What's Changed' including '<!-- Release notes generated using...'
          RELEASE_BODY_CLEAN="$(awk '
            /^##[[:space:]]/ { found=1; next }
            found { print }
          ' <<< "$RELEASE_BODY")"

          RELEASE_BODY_CLEAN="$(perl -pe '
            # GitHub PR URL → [#num](url)
            s{
              https://github\.com/([^/\s]+/[^/\s]+)/pull/([0-9]+)
            }{[#$2](https://github.com/$1/pull/$2)}gx;

            # @username
            # → [@username](https://github.com/username)
            # @username[bot]
            # → [@username](https://github.com/username)[bot]

            ## NOTE: '[' '@' '1' ']' sequence may cause problem. Use charcode instead.
            s/@([^\s\[]+)(\[[^\]]+\])?/\x5B\x40$1\x5D(https:\/\/github.com\/$1)$2/g;
          ' <<< "$RELEASE_BODY_CLEAN")"

          # Remove existing '# Changelog'
          CHANGELOG_BODY_CLEAN="$(awk '
            /^#[[:space:]]/ { found=1; next }
            found { print }
          ' "$CHANGELOG_FILE")"

          # Version format (no v prefix) is aligned to 'release-please'
          {
            echo "# Changelog"
            echo
            echo "## [${RELEASE_TAG}](${RELEASE_URL}) ($(date -u +'%Y-%m-%d'))"
            echo
            echo "$RELEASE_BODY_CLEAN"

            if [ -n "$CHANGELOG_BODY_CLEAN" ]; then
              echo
              echo "$CHANGELOG_BODY_CLEAN"
            fi
          } > "$CHANGELOG_FILE"

          echo "Preview (top 20 lines):"
          head -n 20 "$CHANGELOG_FILE" || true

          echo "===================================="
          echo "🚀 Creating Pull Request"
          echo "===================================="

          TS=$(date -u +"%Y%m%d-%H%M%S")

          # Force push even if not allowed in .gitignore
          git add -f "$CHANGELOG_FILE"
          if ! git commit -m "[bot] Changelog ${RELEASE_TAG} ($TS)"; then
            echo "::warning title=No changes::Skipping CHANGELOG update: ${RELEASE_TAG}"
            exit 0
          fi
          git push -u origin "$BRANCH"

          echo "📤 Branch pushed: $BRANCH"

          # Create PR only if one doesn't already exist
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --fill \
            || echo "::warning title=PR already exists::Skipping CHANGELOG update: ${RELEASE_TAG}"

  auto-bump:
    name: 'Auto Bump and Create PR'
    if: |
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
      && inputs.auto-bump-args
      && inputs.auto-bump-version

    runs-on: ubuntu-slim
    steps:

      ## Don't use 'sparse-checkout' here.
      ## --> csproj mode targets all of text files.
      - uses: actions/checkout@v6

      - name: Main
        run: |
          set -euo pipefail

          BUMP_VERSION="${{ inputs.auto-bump-version }}"
          BUMP_VERSION="${BUMP_VERSION#v}"

          BUMP_ARGS="${{ inputs.auto-bump-args }}"

          echo "===================================="
          echo "📝 Preparing Repository"
          echo "===================================="

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/dot-github-${{ github.job }}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          echo "===================================="
          echo "✏️ Update Files"
          echo "===================================="

          ## Always run npm (safe even if repo isn't Node)
          npm version "$BUMP_VERSION" --no-git-tag-version || true

          ##
          ##   csproj update
          ##
          if [[ "$BUMP_ARGS" == csproj* ]]; then
            sudo apt-get update
            sudo apt-get install -y ripgrep

            ## Extract target property name from input: csproj=Version or similar
            PROPERTY_PATH="${BUMP_ARGS#csproj=}"

            echo "PROPERTY_PATH = $PROPERTY_PATH"

            ## Read current version from first matching csproj/props file
            CURRENT_VERSION="$(
              rg -o "<${PROPERTY_PATH}>[^<]+</${PROPERTY_PATH}>" \
                --no-filename \
                -g "*.csproj" -g "*.props" \
                . \
              | head -n1 \
              | sed -E "s|</?${PROPERTY_PATH}>||g"
            )"

            echo "CURRENT_VERSION = $CURRENT_VERSION"

            ## Fail fast if property is not found (prevents accidental global replace)
            if [[ -z "$CURRENT_VERSION" ]]; then
              echo "ERROR: Property '$PROPERTY_PATH' not found in csproj/props files"
              exit 1
            fi

            # Escape for regex
            escape() {
              printf '%s' "$1" | sed -E 's/[][(){}.^$*+?|\\]/\\&/g'
            }
            CURRENT_VERSION="$(escape "$CURRENT_VERSION")"
            BUMP_VERSION="$(escape "$BUMP_VERSION")"

            ## Replace only exact matches of current version
            rg -l "\b${CURRENT_VERSION}\b" . \
              --glob '!.git/**' \
              --glob '!node_modules/**' \
              --glob '!bin/**' \
              --glob '!obj/**' \
              --glob '!dist/**' |
            xargs sed -i -E "s/\b${CURRENT_VERSION}\b/${BUMP_VERSION}/g"

            echo "Version bump completed"

          fi

          echo "===================================="
          echo "🚀 Creating Pull Request"
          echo "===================================="

          TS=$(date -u +"%Y%m%d-%H%M%S")

          # Don't include ignored files
          git add .
          if ! git commit -m "[bot] Bump ${BUMP_VERSION} ($TS)"; then
            echo "::warning title=No changes::Bump skipped: ${CURRENT_VERSION}"
            exit 0
          fi
          git push -u origin "$BRANCH"

          echo "📤 Branch pushed: $BRANCH"

          # Create PR only if one doesn't already exist
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --fill \
            || echo "::warning title=PR already exists::Bump skipped: ${CURRENT_VERSION}"
