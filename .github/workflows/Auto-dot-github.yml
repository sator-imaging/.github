###


env:
  GH_TOKEN: ${{ github.token }}  # For gh command
  # Sync .github
  WORKDIR: dot-github-sync
  TARGET_DIR: .github
  CENTRAL_REPO: ${{ github.repository_owner }}/.github
  # PR labeler
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
  REPO: ${{ github.repository }}
  # Auto bump
  CHANGELOG_FILE: CHANGELOG.md


jobs:

  sync-dot-github:
    name: 'Sync `.github` Folder Up to Date'
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && (!inputs.auto-bump || !startsWith(inputs.auto-bump, 'v'))

    permissions:
      pull-requests: write
      contents: write

    runs-on: ubuntu-slim
    steps:

      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ env.TARGET_DIR }}
          sparse-checkout-cone-mode: true

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.CENTRAL_REPO }}
          path: ${{ env.WORKDIR }}
          sparse-checkout: |
            ${{ env.TARGET_DIR }}
          sparse-checkout-cone-mode: true

      - name: Main
        run: |
          set -euo pipefail

          echo "===================================="
          echo "📝 Preparing Repository"
          echo "===================================="

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/dot-github-${{ github.job }}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          echo "===================================="
          echo "✏️ Update Files"
          echo "===================================="

          # Sync all files (additive)
          mkdir -p "$TARGET_DIR"
          rsync -av "$WORKDIR/$TARGET_DIR/" "$TARGET_DIR/"

          # There is no way to update workflows with 'permissions' in yaml
          rm -rf "$TARGET_DIR"/workflows/*.yml

          echo "===================================="
          echo "🚀 Creating Pull Request"
          echo "===================================="

          TS=$(date -u +"%Y%m%d-%H%M%S")

          # Force push even if not allowed in .gitignore
          git add -f --ignore-removal "$TARGET_DIR"
          if ! git commit -m "[bot] 🔄 Sync \`${TARGET_DIR}\` ($TS)"; then
            echo "::warning title=No changes::Skipping .github sync"
            exit 0
          fi
          git push -u origin "$BRANCH"

          # Create PR only if one doesn't already exist
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --fill \
            || echo "::warning title=PR already exists::Skipped"

  pr-labeler:
    name: 'Label for GH Release Notes'
    if: |
      github.event_name == 'pull_request'

    permissions:
      pull-requests: write
      issues: write

    runs-on: ubuntu-slim
    steps:

      - name: Main
        run: |
          set -euo pipefail

          ## Check both PR title and merge commit title

          matches_pattern() {
            local pattern="$1"

            # Case-insensitive
            echo "$COMMIT_TITLE" | grep -qiE "$pattern" \
              || echo "$PR_TITLE" | grep -qiE "$pattern"
          }

          ## Get a merge commit title

          # Resolve squash merge
          RESOLVED_MERGE_SHA=$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json mergeCommit \
            --jq '.mergeCommit.oid')

          if [ -n "$RESOLVED_MERGE_SHA" ] && [ "$RESOLVED_MERGE_SHA" != "null" ]; then
            MERGE_COMMIT_SHA="$RESOLVED_MERGE_SHA"
          fi

          if [ -n "$MERGE_COMMIT_SHA" ]; then
            COMMIT_TITLE=$(gh api \
              repos/$REPO/commits/$MERGE_COMMIT_SHA \
              --jq '.commit.message | split("\n")[0]')
          else
            COMMIT_TITLE=""
          fi

          echo "📦 PR title: $PR_TITLE"
          echo "🔀 Commit title: $COMMIT_TITLE"

          ## Labels chosen for GH Release Notes Generation

          labels=()

          if matches_pattern '^fix[:(]'; then
            labels+=("bug")
          fi

          if matches_pattern '^feat[:(]'; then
            labels+=("enhancement")
          fi

          if matches_pattern '^docs[:(]'; then
            labels+=("documentation")
          fi

          if matches_pattern '^deps[:(]'; then
            labels+=("dependencies")
          fi

          # Use '^(...|...)' for stability
          if matches_pattern '^(\[bot\]|bot:)'; then
            labels+=("bot")
          fi

          if matches_pattern '^[a-z]+(\(.+\))?!:'; then
            labels+=("breaking-change")
          fi

          ## Add detected labels or log warning

          if [ ${#labels[@]} -eq 0 ]; then
            echo "::warning title=No release-note label detected::PR='$PR_TITLE' | commit='$COMMIT_TITLE'"
            exit 0
          fi

          echo "🏷️ Detected Labels"

          for label in "${labels[@]}"; do
            echo "    - $label"

            # Fails if label doesn't exist
            gh label create "$label" --repo "$REPO" || true

            gh pr edit "$PR_NUMBER" \
              --repo "$REPO" \
              --add-label "$label"
          done

  auto-bump:
    name: 'Auto Bump and Update CHANGELOG.md'
    if: |
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
      && inputs.auto-bump && startsWith(inputs.auto-bump, 'v')
      && inputs.auto-bump-args

    permissions:
      pull-requests: write
      contents: write

    runs-on: ubuntu-slim
    steps:
      - name: Check tag-associated GH release existence
        run: |
          set -euo pipefail

          TAG="${{ inputs.auto-bump }}"
          if gh release view "$TAG" --repo "$REPO"  >/dev/null 2>&1; then
            echo "::error title=Tag conflict::GH release for tag '$TAG' already exists"
            exit 1
          fi

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ inputs.auto-bump }}
          draft: true
          generate_release_notes: true
          make_latest: true

      ## Don't use 'sparse-checkout' here.
      ## --> csproj mode targets all of text files.
      - uses: actions/checkout@v6

      - name: Main
        run: |
          set -euo pipefail

          BUMP_ARGS="${{ inputs.auto-bump-args }}"

          echo "===================================="
          echo "📦 Fetch latest release"
          echo "===================================="


          RELEASE_JSON="$(
            gh api repos/:owner/:repo/releases?per_page=3 \
              --jq 'map({
                tagName: .tag_name,
                body: .body,
                url: .html_url,
                draft: .draft
              }) | .[0]'
          )"

          # Don't remove 'v' prefix here.
          RELEASE_TAG="$(jq -r '.tagName' <<< "$RELEASE_JSON")"
          RELEASE_BODY="$(jq -r '.body' <<< "$RELEASE_JSON")"
          RELEASE_URL="$(jq -r '.url' <<< "$RELEASE_JSON")"

          # NOTE: This workflow based on a draft release so the url has a tag like 'untagged-{hash}'.
          #       Need to rebuild release url using tag.
          REPO_FULL_NAME="$(gh repo view --json nameWithOwner -q '.nameWithOwner')"
          RELEASE_URL="https://github.com/${REPO_FULL_NAME}/releases/tag/${RELEASE_TAG}"

          # Then, remove 'v' prefix.
          RELEASE_TAG="${RELEASE_TAG#v}"

          echo "👉 Tag:  $RELEASE_TAG"
          echo "👉 URL:  $RELEASE_URL"
          echo "👉 Body (top 10 lines):"
          echo "$RELEASE_BODY" | head -n 10

          if [[ -z "$RELEASE_TAG" || -z "$RELEASE_BODY" || -z "$RELEASE_URL" ]]; then
            echo "::warning title=Missing release data::tag/body/url is empty"
            exit 1
          fi

          echo "===================================="
          echo "📝 Preparing Repository"
          echo "===================================="

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/dot-github-${{ github.job }}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          echo "===================================="
          echo "✏️ Update Files Phase 1"
          echo "===================================="

          touch "$CHANGELOG_FILE"

          if grep -Fq "## [${RELEASE_TAG}](https://github.com/" "$CHANGELOG_FILE"; then
            echo "::warning title=Already exists::Skipping Bump: ${RELEASE_TAG}"
          else

            # Remove first level 2 heading (e.g., '## What's Changed') including '<!-- Release notes generated using...'
            RELEASE_BODY_CLEAN="$(awk '
              !found && /^##[[:space:]]/ { found=1; next }
              found { print }
            ' <<< "$RELEASE_BODY")"

            RELEASE_BODY_CLEAN="$(printf '%s' "$RELEASE_BODY_CLEAN" | sed 's/^##[[:space:]]/### 🎉 /')"

            RELEASE_BODY_CLEAN="$(perl -pe '
              # GitHub PR URL → [#num](url)
              s{
                https://github\.com/([^/\s]+/[^/\s]+)/pull/([0-9]+)
              }{[#$2](https://github.com/$1/pull/$2)}gx;

              # @username
              # → [@username](https://github.com/username)
              # @username[bot]
              # → [@username](https://github.com/username)[bot]

              ## NOTE: '[' '@' '1' ']' sequence may cause problem. Use charcode instead.
              s/@([^\s\[]+)(\[[^\]]+\])?/\x5B\x40$1\x5D(https:\/\/github.com\/$1)$2/g;
            ' <<< "$RELEASE_BODY_CLEAN")"

            echo "===================================="
            printf '%s\n' "$RELEASE_BODY_CLEAN"
            echo "===================================="

            # Remove existing '# Changelog'
            CHANGELOG_BODY_CLEAN="$(awk '
              /^#[[:space:]]/ { found=1; next }
              found { print }
            ' "$CHANGELOG_FILE")"

            # Version format (no v prefix) is aligned to 'release-please'
            {
              echo "# Changelog"
              echo
              echo "## [${RELEASE_TAG}](${RELEASE_URL}) ($(date -u +'%Y-%m-%d'))"
              echo
              echo "$RELEASE_BODY_CLEAN"

              if [ -n "$CHANGELOG_BODY_CLEAN" ]; then
                echo
                echo "$CHANGELOG_BODY_CLEAN"
              fi
            } > "$CHANGELOG_FILE"

          fi

          echo "👉 CHANGELOG (top 10 lines):"
          head -n 20 "$CHANGELOG_FILE" || true

          echo "===================================="
          echo "✏️ Update Files Phase 2"
          echo "===================================="

          installRipgrep() {
            if ! command -v rg >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ripgrep
            fi
          }

          CURRENT_VERSION=""

          ##
          ##   Get current version from npm
          ##
          if [[ "$BUMP_ARGS" == npm ]]; then
            CURRENT_VERSION="$(npm pkg get version --workspaces=false 2>/dev/null | tr -d '"')" || true

            ## Always run npm (safe even if repo isn't Node)
            ## Note that workspace root package*.json is updated here, string-based replacement follows.
            npm version "$RELEASE_TAG" --no-git-tag-version || true
          fi

          ##
          ##   Get current version from csproj
          ##
          if [[ "$BUMP_ARGS" == csproj* ]]; then
            installRipgrep

            ## Extract target property name from input: csproj=Version or similar
            PROPERTY_PATH="${BUMP_ARGS#csproj=}"

            echo "PROPERTY_PATH = $PROPERTY_PATH"

            ## Read current version from first matching csproj/props file
            CURRENT_VERSION="$(
              rg -o "<${PROPERTY_PATH}>[^<]+</${PROPERTY_PATH}>" \
                --no-filename \
                -g "*.csproj" -g "*.props" \
                . \
              | head -n1 \
              | sed -E "s|</?${PROPERTY_PATH}>||g"
            )"

            echo "CURRENT_VERSION = $CURRENT_VERSION"

            ## Fail fast if property is not found (prevents accidental global replace)
            if [[ -z "$CURRENT_VERSION" ]]; then
              echo "ERROR: Property '$PROPERTY_PATH' not found in csproj/props files"
              exit 1
            fi
          fi

          ##
          ##   Update version by string-based replacement
          ##
          if [[ -n "$CURRENT_VERSION" && "$CURRENT_VERSION" != "$RELEASE_TAG" ]]; then

            echo "Starting text-based version bump"

            installRipgrep

            # Escape for regex
            escape() {
              printf '%s' "$1" | sed -E 's/[][(){}.^$*+?|\\]/\\&/g'
            }
            ESCAPED_CURRENT_VERSION="$(escape "$CURRENT_VERSION")"

            echo "  Executing rg..."

            ## Replace only exact matches of current version
            ## --> Ignore workspace root package*.json as it was updated by npm command
            replaceTargets=$(rg -l "\b${CURRENT_VERSION}\b" . \
              --glob '!/package*.json' \
              --glob '!.git/**' \
              --glob '!CHANGELOG.md' \
              --glob '!node_modules/**' \
              --glob '!bin/**' \
              --glob '!obj/**' \
              --glob '!dist/**' \
              || true
            )

            echo "  Checking rg status..."

            # Ignore no match error
            rg_status=$?
            if [ $rg_status -ne 0 ] && [ $rg_status -ne 1 ]; then
              exit $rg_status
            fi

            echo "  Executing sed..."

            if [ -n "$replaceTargets" ]; then
              echo "$replaceTargets" \
                | xargs -d '\n' sed -i -E "s/\b${ESCAPED_CURRENT_VERSION}\b/${RELEASE_TAG}/g"
            fi

            echo "Version bump completed"

          fi

          echo "===================================="
          echo "🚀 Creating Pull Request"
          echo "===================================="

          TS=$(date -u +"%Y%m%d-%H%M%S")

          # Don't include ignored files
          git add .

          # But force push CHANGELOG even if not allowed in .gitignore
          git add -f "$CHANGELOG_FILE"
          if ! git commit -m "[bot] 📦 \`${RELEASE_TAG}\` ($TS)"; then
            echo "::warning title=No changes::Bump skipped: ${CURRENT_VERSION}"
            exit 0
          fi
          git push -u origin "$BRANCH"

          echo "📤 Branch pushed: $BRANCH"

          # Create PR only if one doesn't already exist
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --fill \
            || echo "::warning title=PR already exists::Skipped"
