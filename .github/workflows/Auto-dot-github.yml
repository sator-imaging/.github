name: '[Auto] Repo Gardening'

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
  workflow_call:
  pull_request:
    types:
      - opened
      - edited
      - closed
      - reopened
  release:
    types:
      - published

#jobs:
#  reuse:
#    uses: sator-imaging/.github/.github/workflows/Auto-dot-github.yml@main
#    secrets: inherit
#    permissions:
#      pull-requests: write
#      contents: write  # Sync .github | Auto changelog
#      issues: write    # PR labeler


###
###   Copy above (including 'on') and uncomment to reuse this action in other repo
###


permissions:
  pull-requests: write
  contents: write
  issues: write

env:
  GH_TOKEN: ${{ github.token }}  # For gh command
  # Sync .github
  WORKDIR: dot-github-sync
  TARGET_DIR: .github
  CENTRAL_REPO: ${{ github.repository_owner }}/.github
  # PR labeler
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
  REPO: ${{ github.repository }}
  # Auto changelog
  CHANGELOG_FILE: CHANGELOG.md


jobs:
  sync-dot-github:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ env.TARGET_DIR }}
          sparse-checkout-cone-mode: true

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.CENTRAL_REPO }}
          path: ${{ env.WORKDIR }}
          sparse-checkout: |
            ${{ env.TARGET_DIR }}
          sparse-checkout-cone-mode: true

      - name: Main
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/${WORKDIR}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          # Sync all files (additive)
          mkdir -p "$TARGET_DIR"
          rsync -av "$WORKDIR/$TARGET_DIR/" "$TARGET_DIR/"

          # There is no way to update workflows with 'permissions' in yaml
          rm -rf "$TARGET_DIR"/workflows/*.yml

          TS=$(date -u +"%Y%m%d-%H%M%S")

          # Force push even if not allowed in .gitignore
          git add -f --ignore-removal "$TARGET_DIR"
          git commit -m "[bot] Sync \`${TARGET_DIR}\` ($TS)" \
            || (echo "::warning title=No changes::Skipped" && exit 0)
          git push -u origin "$BRANCH"

          # Create PR only if one doesn't already exist
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --fill \
            || echo "::warning title=PR already exists::Skipped"

  pr-labeler:
    if: github.event_name == 'pull_request'

    runs-on: ubuntu-slim
    steps:
      - name: Main
        run: |
          set -euo pipefail

          ## Check both PR title and merge commit title

          matches_pattern() {
            local pattern="$1"

            # Case-insensitive
            echo "$COMMIT_TITLE" | grep -qiE "$pattern" \
              || echo "$PR_TITLE" | grep -qiE "$pattern"
          }

          ## Get a merge commit title

          if [ -n "$MERGE_COMMIT_SHA" ]; then
            COMMIT_TITLE=$(gh api \
              repos/$REPO/commits/$MERGE_COMMIT_SHA \
              --jq '.commit.message | split("\n")[0]')
          else
            COMMIT_TITLE=""
          fi

          {
            echo "📦 PR title: $PR_TITLE"
            echo "🔀 Merge commit title: $COMMIT_TITLE"
          } >> $GITHUB_STEP_SUMMARY

          ## Labels chosen for GH Release Notes Generation

          labels=()

          if matches_pattern '^fix[:(]'; then
            labels+=("bug")
          fi

          if matches_pattern '^feat[:(]'; then
            labels+=("enhancement")
          fi

          if matches_pattern '^docs[:(]'; then
            labels+=("documentation")
          fi

          if matches_pattern '^[a-z]+(\(.+\))?!:'; then
            labels+=("breaking-change")
          fi

          ## Add detected labels or log warning

          if [ ${#labels[@]} -eq 0 ]; then
            echo "::warning title=No release-note label detected::PR title='$PR_TITLE' commit title='$COMMIT_TITLE'"
          fi

          echo "Labels" >> $GITHUB_STEP_SUMMARY

          for label in "${labels[@]}"; do
            echo "- $label" >> $GITHUB_STEP_SUMMARY

            gh issue edit "$PR_NUMBER" \
              --repo "$REPO" \
              --add-label "$label"
          done

  auto-changelog:
    if: |
      (github.event_name == 'release' && github.event.action == 'published')
      || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            .git
            ${{ env.CHANGELOG_FILE }}
          sparse-checkout-cone-mode: false

      - name: Main
        run: |
          set -euo pipefail

          echo "===================================="
          echo "📦 Fetch latest release"
          echo "===================================="

          RELEASE_JSON="$(gh api repos/:owner/:repo/releases?per_page=3 \
            --jq 'map(select(.draft == false)
                  | {tagName: .tag_name, body: .body, url: .html_url})
                  | .[0]' )"

          RELEASE_TAG="$(jq -r '.tagName' <<< "$RELEASE_JSON" | sed 's/^v//')"
          RELEASE_BODY="$(jq -r '.body' <<< "$RELEASE_JSON")"
          RELEASE_URL="$(jq -r '.url' <<< "$RELEASE_JSON")"

          echo "👉 Tag:  $RELEASE_TAG"
          echo "👉 URL:  $RELEASE_URL"
          echo "👉 Body:"
          echo "$RELEASE_BODY"

          # Remove '## What's Changed' including '<!-- Release notes generated using...'
          RELEASE_BODY_CLEAN="$(awk '
            /^##[[:space:]]/ { found=1; next }
            found { print }
          ' <<< "$RELEASE_BODY")"

          echo "===================================="
          echo "📝 Preparing CHANGELOG"
          echo "===================================="

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/changelog-${RELEASE_TAG}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          echo "===================================="
          echo "📄 CHANGELOG updated"
          echo "===================================="

          touch "$CHANGELOG_FILE"

          if grep -Fq "## [${RELEASE_TAG}](https://github.com/" "$CHANGELOG_FILE"; then
            echo "::warning title=Already exists in CHANGELOG::Skipping update: ${RELEASE_TAG}"
            exit 0
          fi

          # Remove existing '# Changelog'
          CHANGELOG_BODY_CLEAN="$(awk '
            /^#[[:space:]]/ { found=1; next }
            found { print }
          ' "$CHANGELOG_FILE")"

          # Version section format is aligned to 'release-please'
          {
            echo "# Changelog"
            echo
            echo "## [${RELEASE_TAG}](${RELEASE_URL}) ($(date -u +'%Y-%m-%d'))"
            echo
            echo "$RELEASE_BODY_CLEAN"

            if [ -n "$CHANGELOG_BODY_CLEAN" ]; then
              echo
              echo "$CHANGELOG_BODY_CLEAN"
            fi
          } > "$CHANGELOG_FILE"

          echo "Preview (top 20 lines):"
          head -n 20 "$CHANGELOG_FILE" || true

          echo "===================================="
          echo "🚀 Creating Pull Request"
          echo "===================================="

          TS=$(date -u +"%Y%m%d-%H%M%S")

          # Force push even if not allowed in .gitignore
          git add -f "$CHANGELOG_FILE"
          git commit -m "[bot] Changelog ${RELEASE_TAG} ($TS)" \
            || (echo "::warning title=No changes::Skipped ${RELEASE_TAG}" && exit 0)
          git push -u origin "$BRANCH"

          echo "📤 Branch pushed: $BRANCH"

          # Create PR only if one doesn't already exist
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --fill \
            || echo "::warning title=PR already exists::Skipped ${RELEASE_TAG}"
